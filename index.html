<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
 
 
  <div class="dashboard">
 
    <!-- Greeting Section -->
    <section class="card card--greeting">
      <div id="clock">00:00:00</div>
      <div id="date-display">Loading...</div>
      <div id="greet-text">Hello!</div>
      <div id="name-wrapper">
        <span id="display-name"></span>
        <button id="btn-edit-name" title="Edit name">✎</button>
      </div>
      <div id="name-form" class="hidden">
        <input type="text" id="name-input" placeholder="Enter your name..." maxlength="30">
        <button id="btn-save-name">Save</button>
      </div>
    </section>
 
    <!-- Main Content -->
    <div class="main-grid">
 
      <!-- Focus Timer -->
      <section class="card card--timer">
        <h2 class="card-title">Focus Timer</h2>
        <div id="timer-display">25:00</div>
        <div class="timer-duration">
          <label for="duration-input">Minutes:</label>
          <input type="number" id="duration-input" value="25" min="1" max="120">
        </div>
        <div class="timer-controls">
          <button id="btn-start" class="btn btn--primary">Start</button>
          <button id="btn-stop" class="btn btn--secondary">Stop</button>
          <button id="btn-reset" class="btn btn--secondary">Reset</button>
        </div>
      </section>
 
      <!-- To-Do List -->
      <section class="card card--todo">
        <h2 class="card-title">Tasks</h2>
        <div class="todo-input-row">
          <input type="text" id="todo-input" placeholder="Add a new task...">
          <button id="btn-add-todo" class="btn btn--primary">Add</button>
        </div>
        <div class="todo-sort-row">
          <button id="btn-sort" class="btn btn--ghost btn--sm">Sort A–Z</button>
          <span id="task-count"></span>
        </div>
        <ul id="todo-list"></ul>
      </section>
 
      <!-- Quick Links -->
      <section class="card card--links">
        <h2 class="card-title">Quick Links</h2>
        <div class="links-input-row">
          <input type="text" id="link-name" placeholder="Link name">
          <input type="url" id="link-url" placeholder="https://...">
          <button id="btn-add-link" class="btn btn--primary">Add Link</button>
        </div>
        <div id="links-container"></div>
      </section>
 
    </div>
  </div>
 
  <script src="js/script.js"></script>
</body>
</html>
